<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyFlow｜口コミ返信デモ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --white: #f5f5f5;
  --muted: #888;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--black);
  color: var(--white);
  max-width: 600px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}
.header {
  text-align: center;
  margin-bottom: 32px;
}
.header-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--black);
  background: var(--gold);
  padding: 4px 10px;
  border-radius: 4px;
  margin-bottom: 14px;
}
.header h1 {
  font-size: 22px;
  font-weight: 900;
  line-height: 1.4;
  margin-bottom: 8px;
}
.header h1 em { font-style: normal; color: var(--gold); }
.header p { font-size: 12px; color: var(--muted); line-height: 1.7; }

.box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-bottom: 20px;
}
.field { display: flex; flex-direction: column; gap: 8px; }
.label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; }

.star-selector { display: flex; flex-wrap: wrap; gap: 6px; }
.star-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 12px;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
}
.star-btn.active { border-color: var(--gold); color: #f5c518; background: rgba(201,168,76,0.1); }

.tone-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.tone-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
}
.tone-btn.active { border-color: var(--gold); color: var(--gold-light); background: rgba(201,168,76,0.1); }

textarea {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  color: var(--white);
  font-size: 13px;
  font-family: inherit;
  line-height: 1.7;
  resize: vertical;
  min-height: 110px;
  width: 100%;
}
textarea:focus { outline: none; border-color: var(--gold); }

.generate-btn {
  background: var(--gold);
  color: var(--black);
  border: none;
  border-radius: 8px;
  padding: 15px;
  font-size: 15px;
  font-weight: 900;
  font-family: inherit;
  cursor: pointer;
  width: 100%;
  transition: opacity 0.2s;
}
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.result { display: none; }
.result-header {
  padding: 12px 18px;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--gold);
  border-bottom: none;
  border-radius: 12px 12px 0 0;
}
.result-label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.1em; display: block; margin-bottom: 2px; }
.result-sub { font-size: 11px; color: #888; }
.result-body {
  border: 1px solid var(--gold);
  border-top: none;
  border-radius: 0 0 12px 12px;
  overflow: hidden;
}
.reply-card {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.reply-card:last-child { border-bottom: none; }
.reply-num { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 8px; }
.reply-text { font-size: 13px; color: #ccc; line-height: 1.8; }
.copy-btn {
  margin-top: 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 6px 12px;
  font-size: 11px;
  color: #888;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.copy-btn:hover { border-color: var(--gold); color: var(--gold); }

.cta {
  margin-top: 28px;
  background: linear-gradient(135deg, #1e1a0e 0%, #1a1a1a 100%);
  border: 1px solid var(--gold);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
}
.cta h3 { font-size: 16px; font-weight: 900; margin-bottom: 6px; }
.cta h3 em { font-style: normal; color: var(--gold); }
.cta p { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.7; }
.cta-link {
  display: inline-block;
  background: var(--gold);
  color: var(--black);
  font-size: 13px;
  font-weight: 900;
  padding: 12px 24px;
  border-radius: 8px;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="header">
  <span class="header-badge">ReplyFlow デモ</span>
  <h1>口コミを入力して<br><em>返信文を無料生成</em></h1>
  <p>実際の口コミをそのまま貼り付けてください。<br>AIが即座に返信文を3パターン作成します。</p>
</div>

<div class="box">
  <div class="field">
    <span class="label">⭐ 星の数</span>
    <div class="star-selector">
      <button class="star-btn active" data-val="5">★★★★★</button>
      <button class="star-btn" data-val="4">★★★★☆</button>
      <button class="star-btn" data-val="3">★★★☆☆</button>
      <button class="star-btn" data-val="2">★★☆☆☆</button>
      <button class="star-btn" data-val="1">★☆☆☆☆</button>
    </div>
  </div>
  <div class="field">
    <span class="label">📝 口コミ内容</span>
    <textarea id="reviewInput" placeholder="例：ランチに来ました。パスタが美味しかったです。スタッフの方も親切で、また来たいと思います。"></textarea>
  </div>
  <div class="field">
    <span class="label">🏪 店舗の雰囲気（任意）</span>
    <div class="tone-selector">
      <button class="tone-btn active" data-val="カジュアル">カジュアル</button>
      <button class="tone-btn" data-val="丁寧・フォーマル">丁寧・フォーマル</button>
      <button class="tone-btn" data-val="温かみ重視">温かみ重視</button>
    </div>
  </div>
  <button class="generate-btn" id="generateBtn" onclick="generateReply()">
    ✨ 返信文を生成する（無料）
  </button>
</div>

<div class="result" id="result">
  <div class="result-header">
    <span class="result-label">AI生成結果</span>
    <span class="result-sub">コピーしてGoogleマップに貼り付けるだけです</span>
  </div>
  <div class="result-body" id="resultBody"></div>
</div>

<div class="cta">
  <h3>毎月の口コミ返信、<br><em>全部お任せしませんか？</em></h3>
  <p>月額プランなら返信文の作成から納品まで<br>すべておまかせいただけます。</p>
  <a class="cta-link" href="https://com-ai-support.github.io/review-support/review_support_proposal-4.html">料金・詳細を見る →</a>
</div>

<script>
let selectedStars = 5;
let selectedTone = 'カジュアル';

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedStars = btn.dataset.val;
  });
});

document.querySelectorAll('.tone-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTone = btn.dataset.val;
  });
});

async function generateReply() {
  const review = document.getElementById('reviewInput').value.trim();
  if (!review) { alert('口コミ内容を入力してください'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';

  const prompt = `あなたは飲食店・カフェ・美容室などの店舗オーナーの代わりにGoogleマップの口コミへの返信文を作成するプロです。

以下の口コミに対して、自然で丁寧な返信文を3パターン生成してください。

【口コミ情報】
星評価: ${selectedStars}点/5点
店舗の雰囲気: ${selectedTone}
口コミ内容: ${review}

【ルール】
- 各パターンは異なるトーン・表現にする
- テンプレートっぽくならないようにする
- 口コミの具体的な内容に言及する
- 150〜200文字程度
- 敬語・丁寧語を使う
- 低評価の場合は誠実な謝罪と改善姿勢を示す

以下のJSON形式のみで返答してください（前後の文章・コードブロック不要）:
{"replies": ["返信文1", "返信文2", "返信文3"]}`;

  try {
    const response = await fetch('https://reply-flow-api.aa52965296.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.choices[0].message.content;
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('resultBody').innerHTML = parsed.replies.map((reply, i) => `
      <div class="reply-card">
        <p class="reply-num">パターン ${i + 1}</p>
        <p class="reply-text" id="reply${i}">${reply}</p>
        <button class="copy-btn" onclick="copyText('reply${i}', this)">📋 コピー</button>
      </div>
    `).join('');

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });

  } catch(e) {
    alert('エラーが発生しました。しばらくしてからお試しください。');
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 返信文を生成する（無料）';
  }
}

function copyText(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ コピーしました';
    setTimeout(() => { btn.textContent = '📋 コピー'; }, 2000);
  });
}
</script>
</body>
</html>
